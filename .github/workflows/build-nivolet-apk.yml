name: Build Nivolet APK
on:
  workflow_dispatch:
  push:
    branches: [nivolet-apk]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - run: gradle -p nivolet-hike assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: Nivolet-Hors-Ligne-APK
          path: nivolet-hike/app/build/outputs/apk/debug/app-debug.apk
