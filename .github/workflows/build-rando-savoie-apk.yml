name: Build Rando Savoie APK

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Download official Nivolet GPX
        shell: bash
        run: |
          mkdir -p nivolet-app-v2/app/src/main/assets
          URL_1="https://carte.explore-savoie.com/download/balade/gpx/fr/58859f17-d252-4529-94b8-9c6d35710abd"
          URL_2="https://explore.chamberymontagnes.com/fr/itineraires/la-croix-du-nivolet-depuis-le-sire/gpx"
          curl -fL --retry 3 -A "Mozilla/5.0" "$URL_1" -o nivolet-app-v2/app/src/main/assets/nivolet.gpx \
            || curl -fL --retry 3 -A "Mozilla/5.0" "$URL_2" -o nivolet-app-v2/app/src/main/assets/nivolet.gpx
          grep -qi "<gpx" nivolet-app-v2/app/src/main/assets/nivolet.gpx

      - name: Build debug APK
        run: gradle -p nivolet-app-v2 assembleDebug --stacktrace

      - name: Prepare APK
        run: cp nivolet-app-v2/app/build/outputs/apk/debug/app-debug.apk Rando-Savoie-Offline-v2.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rando-Savoie-Offline-v2
          path: Rando-Savoie-Offline-v2.apk
          if-no-files-found: error
