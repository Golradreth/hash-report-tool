name: Build Rando Savoie v4.1

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || 'rando-savoie-v4-ui' }}
          fetch-depth: 0

      - name: Remove white route outline and bump version
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          java = Path('nivolet-app-v2/app/src/main/java/com/golradreth/randooffline/MainActivity.java')
          text = java.read_text(encoding='utf-8')
          shadow = '''        routeShadow = new Polyline();
                  routeShadow.setPoints(points);
                  routeShadow.setColor(Color.argb(220, 255, 255, 255));
                  routeShadow.setWidth(dp(9));
                  map.getOverlays().add(routeShadow);

          '''
          # The Java indentation is exactly eight spaces in the source. Keep an alternate
          # literal for robustness if a formatter changed continuation indentation.
          exact_shadow = '''        routeShadow = new Polyline();
          routeShadow.setPoints(points);
          routeShadow.setColor(Color.argb(220, 255, 255, 255));
          routeShadow.setWidth(dp(9));
          map.getOverlays().add(routeShadow);

          '''
          if exact_shadow in text:
              text = text.replace(exact_shadow, '', 1)
          elif 'routeShadow = new Polyline();' in text:
              start = text.index('        routeShadow = new Polyline();')
              end_marker = '        map.getOverlays().add(routeShadow);\n\n'
              end = text.index(end_marker, start) + len(end_marker)
              text = text[:start] + text[end:]
          # Leave the nullable field and cleanup guard in place; they are harmless and keep
          # the patch intentionally narrow.
          text = text.replace('getPackageName() + "/4.0"', 'getPackageName() + "/4.1"')
          java.write_text(text, encoding='utf-8')

          gradle = Path('nivolet-app-v2/app/build.gradle')
          build = gradle.read_text(encoding='utf-8')
          build = build.replace('versionCode 4', 'versionCode 5')
          build = build.replace("versionName '4.0'", "versionName '4.1'")
          gradle.write_text(build, encoding='utf-8')

          assert 'routeShadow = new Polyline();' not in text
          assert "versionCode 5" in build
          assert "versionName '4.1'" in build
          PY

      - name: Persist source correction
        shell: bash
        run: |
          git config user.name "OpenAI build bot"
          git config user.email "build-bot@users.noreply.github.com"
          git add nivolet-app-v2/app/src/main/java/com/golradreth/randooffline/MainActivity.java nivolet-app-v2/app/build.gradle
          if ! git diff --cached --quiet; then
            git commit -m "Remove white GPX route outline"
            git push origin HEAD:${{ github.event.pull_request.head.ref || 'rando-savoie-v4-ui' }}
          fi

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Download official Nivolet GPX
        shell: bash
        run: |
          mkdir -p nivolet-app-v2/app/src/main/assets
          URL_1="https://carte.explore-savoie.com/download/balade/gpx/fr/58859f17-d252-4529-94b8-9c6d35710abd"
          URL_2="https://explore.chamberymontagnes.com/fr/itineraires/la-croix-du-nivolet-depuis-le-sire/gpx"
          curl -fL --retry 3 -A "Rando-Savoie-Android/4.1" "$URL_1" -o nivolet-app-v2/app/src/main/assets/nivolet.gpx \
            || curl -fL --retry 3 -A "Rando-Savoie-Android/4.1" "$URL_2" -o nivolet-app-v2/app/src/main/assets/nivolet.gpx
          grep -qi "<gpx" nivolet-app-v2/app/src/main/assets/nivolet.gpx

      - name: Build and lint
        run: gradle -p nivolet-app-v2 clean assembleDebug lintDebug --stacktrace

      - name: Verify APK
        shell: bash
        run: |
          APK=nivolet-app-v2/app/build/outputs/apk/debug/app-debug.apk
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee apk-badging.txt
          grep -q "package: name='com.golradreth.randooffline' versionCode='5' versionName='4.1'" apk-badging.txt
          unzip -t "$APK"
          cp "$APK" Rando-Savoie-v4.1.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rando-Savoie-v4.1
          path: Rando-Savoie-v4.1.apk
          if-no-files-found: error
