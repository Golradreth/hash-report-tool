name: Lint Code Base
on: [push, pull_request]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Lint Code Base
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app branch
        uses: actions/checkout@v4
        with:
          ref: rando-savoie-v4-ui
          fetch-depth: 0

      - name: Apply OpenStreetMap fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          java = Path('nivolet-app-v2/app/src/main/java/com/golradreth/randooffline/MainActivity.java')
          text = java.read_text(encoding='utf-8')
          text = text.replace('import org.osmdroid.tileprovider.tilesource.TileSourceFactory;\n', '')
          marker = '    private final List<Route> routes = new ArrayList<>();\n'
          osm_source = '''    private static final OnlineTileSourceBase OPENSTREETMAP = new OnlineTileSourceBase(
            "OpenStreetMap-Official-v2", 0, 19, 256, ".png",
            new String[]{"https://tile.openstreetmap.org/"}, "© OpenStreetMap contributors") {
        @Override public String getTileURLString(long index) {
            int z = MapTileIndex.getZoom(index);
            int x = MapTileIndex.getX(index);
            int y = MapTileIndex.getY(index);
            return getBaseUrl() + z + "/" + x + "/" + y + ".png";
        }
    };

'''
          if 'OpenStreetMap-Official-v2' not in text:
              text = text.replace(marker, osm_source + marker, 1)
          text = text.replace(
              'config.setUserAgentValue(getPackageName() + "/4.1");',
              'config.setUserAgentValue("RandoSavoieOffline/4.2 (+https://github.com/Golradreth/hash-report-tool)");'
          )
          text = text.replace(
              'map.setTileSource(ign ? PLAN_IGN : TileSourceFactory.MAPNIK);',
              'map.setTileSource(ign ? PLAN_IGN : OPENSTREETMAP);'
          )
          java.write_text(text, encoding='utf-8')

          gradle = Path('nivolet-app-v2/app/build.gradle')
          build = gradle.read_text(encoding='utf-8')
          build = build.replace('versionCode 5', 'versionCode 6')
          build = build.replace("versionName '4.1'", "versionName '4.2'")
          gradle.write_text(build, encoding='utf-8')
          PY

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Download official Nivolet GPX
        shell: bash
        run: |
          mkdir -p nivolet-app-v2/app/src/main/assets
          URL_1="https://carte.explore-savoie.com/download/balade/gpx/fr/58859f17-d252-4529-94b8-9c6d35710abd"
          URL_2="https://explore.chamberymontagnes.com/fr/itineraires/la-croix-du-nivolet-depuis-le-sire/gpx"
          curl -fL --retry 3 -A "Rando-Savoie-Android/4.2" "$URL_1" -o nivolet-app-v2/app/src/main/assets/nivolet.gpx \
            || curl -fL --retry 3 -A "Rando-Savoie-Android/4.2" "$URL_2" -o nivolet-app-v2/app/src/main/assets/nivolet.gpx
          grep -qi "<gpx" nivolet-app-v2/app/src/main/assets/nivolet.gpx

      - name: Build and lint Android
        shell: bash
        run: |
          set +e
          gradle -p nivolet-app-v2 clean assembleDebug lintDebug --stacktrace > build-v42.log 2>&1
          echo $? > build-v42-exit.txt
          exit 0

      - name: Verify APK
        shell: bash
        run: |
          set +e
          APK=nivolet-app-v2/app/build/outputs/apk/debug/app-debug.apk
          if test -s "$APK"; then
            "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" > apk-v42-badging.txt 2>&1
            unzip -t "$APK" > apk-v42-unzip.txt 2>&1
            mkdir -p builds
            cp "$APK" builds/Rando-Savoie-v4.2.apk
          else
            echo "APK absent" > apk-v42-badging.txt
          fi
          exit 0

      - name: Publish APK and diagnostics
        if: always()
        shell: bash
        run: |
          mkdir -p builds/v4.2-diagnostics
          cp build-v42.log builds/v4.2-diagnostics/ 2>/dev/null || true
          cp build-v42-exit.txt builds/v4.2-diagnostics/ 2>/dev/null || true
          cp apk-v42-badging.txt builds/v4.2-diagnostics/ 2>/dev/null || true
          cp apk-v42-unzip.txt builds/v4.2-diagnostics/ 2>/dev/null || true
          date -u > builds/v4.2-diagnostics/completed-at.txt
          git config user.name "OpenAI build bot"
          git config user.email "build-bot@users.noreply.github.com"
          git add -f builds/
          git commit -m "Publish Rando Savoie v4.2 build diagnostics" || true
          git push origin HEAD:rando-savoie-v4-ui
